services:
  - type: web
    name: chat-api
    env: docker
    region: frankfurt # You can change this based on your preference
    plan: free # Change to starter or standard for production
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
